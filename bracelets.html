<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* On enlève les marges pour que ça colle parfaitement à l'iframe */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #1e293b; overflow-x: hidden; }
        .sidebar-bracelet { width: 240px; background: #1e293b; color: white; padding: 20px; height: 100vh; position: fixed; }
        .content-bracelet { margin-left: 240px; padding: 30px; min-height: 100vh; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: #3b82f6; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .generator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        #canvas-container { width: 100%; height: 350px; background: #eee; border-radius: 12px; cursor: grab; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-add { background: #3b82f6; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar-bracelet">
        <h2>Configurateur</h2>
        <div class="nav-item active" id="btn-gen"><i class="fas fa-plus"></i> Création</div>
        <div class="nav-item" id="btn-exp"><i class="fas fa-cloud"></i> Explorer</div>
    </div>

    <div class="content-bracelet">
        <div id="mod-generator">
            <h1>Créer un Bracelet Pro Cloud</h1>
            <div class="generator-grid">
                <div class="card">
                    <label>Texte</label>
                    <input type="text" id="input-text" value="✊SEBR.tech - Le Site du Rezo🍆">
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <div style="flex:1"><label>Silicone</label><input type="color" id="color-bg" value="#1e293b"></div>
                        <div style="flex:1"><label>Texte</label><input type="color" id="color-text" value="#ffd500"></div>
                    </div>
                    <label style="margin-top:15px; display:block;">Notes</label>
                    <textarea id="input-event" rows="3"></textarea>
                    <button class="btn-add" id="btn-save">SAUVEGARDER DANS LE CLOUD</button>
                </div>
                <div class="card">
                    <div id="canvas-container"></div>
                </div>
            </div>
        </div>

        <div id="mod-explorer" class="hidden">
            <h1>Historique Cloud</h1>
            <div id="explorer-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:15px;"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1_SgV4E80Qxs2vQ-_jIGexv6YYqaiARs",
        authDomain: "sebr-dea8d.firebaseapp.com",
        projectId: "sebr-dea8d",
        storageBucket: "sebr-dea8d.firebasestorage.app",
        messagingSenderId: "948314281215",
        appId: "1:948314281215:web:1fddf38350d9a3663e68ca"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LOGIQUE 3D ---
    let scene, camera, renderer, outerMesh, innerMesh, controls;

    function init3D() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        const group = new THREE.Group();
        outerMesh = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 1.2, 64, 1, true), new THREE.MeshStandardMaterial());
        innerMesh = new THREE.Mesh(new THREE.CylinderGeometry(3.98, 3.98, 1.2, 64, 1, true), new THREE.MeshStandardMaterial({side: THREE.BackSide}));
        group.add(outerMesh, innerMesh);
        scene.add(group);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;
        
        const animate = () => { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };
        animate();
        updateTexture();
    }

    function updateTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('color-bg').value;
        const tx = document.getElementById('color-text').value;
        const text = document.getElementById('input-text').value.toUpperCase();

        ctx.fillStyle = bg; ctx.fillRect(0,0,1024,128);
        ctx.fillStyle = tx; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
        ctx.fillText(text, 256, 80); ctx.fillText(text, 768, 80);
        
        outerMesh.material.map = new THREE.CanvasTexture(canvas);
        outerMesh.material.needsUpdate = true;
        innerMesh.material.color.set(bg);
    }

    // --- EVENTS ---
    document.getElementById('input-text').oninput = updateTexture;
    document.getElementById('color-bg').oninput = updateTexture;
    document.getElementById('color-text').oninput = updateTexture;

    document.getElementById('btn-gen').onclick = () => {
        document.getElementById('mod-generator').classList.remove('hidden');
        document.getElementById('mod-explorer').classList.add('hidden');
    };

    document.getElementById('btn-exp').onclick = () => {
        document.getElementById('mod-generator').classList.add('hidden');
        document.getElementById('mod-explorer').classList.remove('hidden');
        loadBracelets();
    };

    async function loadBracelets() {
        const grid = document.getElementById('explorer-grid');
        onSnapshot(query(collection(db, "bracelets"), orderBy("timestamp", "desc")), (snap) => {
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `<div class="card" style="background:${d.bg}; color:${d.tx}; text-align:center;">
                    <strong>${d.text}</strong><br><small>${d.note || ''}</small></div>`;
            });
        });
    }

    document.getElementById('btn-save').onclick = async () => {
        await addDoc(collection(db, "bracelets"), {
            text: document.getElementById('input-text').value,
            bg: document.getElementById('color-bg').value,
            tx: document.getElementById('color-text').value,
            note: document.getElementById('input-event').value,
            timestamp: new Date()
        });
        alert("Enregistré dans le Cloud !");
    };

    init3D();
</script>
</body>
</html>
