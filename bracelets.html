<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBR-TECH | Bracelet Pro Cloud</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --sidebar-color: #1e293b;
            --primary-color: #3b82f6;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --poly-cyan: #009EE3;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-color);
            color: white;
            padding: 20px;
        }
        .sidebar h2 { color: var(--primary-color); font-size: 1.2rem; margin-bottom: 30px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: var(--primary-color); }

        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .generator-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #64748b; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-size: 1rem; }

        .color-row { display: flex; gap: 20px; }
        .color-input { flex: 1; }

        #canvas-container {
            width: 100%;
            height: 380px;
            background: white;
            border-radius: 12px;
            position: relative;
            cursor: grab;
            border: 1px solid var(--border-color);
        }
        
        .hint-3d { position: absolute; bottom: 15px; width: 100%; text-align: center; color: #94a3b8; font-size: 0.8rem; pointer-events: none; }

        .btn-add { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.2s; }
        .btn-add:hover { background: #2563eb; transform: translateY(-1px); }

        .bracelet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .bracelet-item { background: white; border-radius: 10px; padding: 15px; border: 1px solid var(--border-color); position: relative;}
        .mini-bandeau { height: 35px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        
        .btn-delete { position: absolute; top: 10px; right: 10px; color: #ef4444; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .btn-delete:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SEBR-TECH</h2>
        <div class="nav-item active" onclick="switchTab('generator')"><i class="fas fa-plus"></i> Création</div>
        <div class="nav-item" onclick="switchTab('explorer')"><i class="fas fa-cloud"></i>Explorer</div>
    </div>

    <div class="main-content">
        <div id="generator" class="tab-content active">
            <h1>Nouveau Bracelet</h1>
            <div class="generator-grid">
                <div class="card">
                    <div class="form-group">
                        <label>Texte du bracelet</label>
                        <input type="text" id="input-text" value="✊SEBR.tech - Le Site du Rezo🍆" oninput="update3DTexture()">
                    </div>

                    <div class="color-row">
                        <div class="color-input">
                            <label>Couleur Silicone</label>
                            <input type="color" id="color-bg" value="#1e293b" oninput="update3DTexture()">
                        </div>
                        <div class="color-input">
                            <label>Couleur Texte</label>
                            <input type="color" id="color-text" value="#ffd500" oninput="update3DTexture()">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label>Notes & Client (Firebase)</label>
                        <textarea id="input-event" rows="3" placeholder="Ex: Commande BDE Lille 2026..."></textarea>
                    </div>

                    <button class="btn-add" id="btn-save" onclick="saveBracelet()">
                        <i class="fas fa-save"></i> SAUVEGARDER
                    </button>
                </div>

                <div class="card" style="padding: 10px;">
                    <div id="canvas-container">
                        <div class="hint-3d"><i class="fas fa-sync"></i> Faites glisser pour inspecter</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="explorer" class="tab-content">
            <h1>Historique Cloud (Collection: bracelets)</h1>
            <div id="explorer-grid" class="bracelet-grid"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET_ID",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- MOTEUR 3D ---
        let scene, camera, renderer, braceletGroup, outerMesh, innerMesh, controls;

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 4, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.4);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            braceletGroup = new THREE.Group();
            const outerGeo = new THREE.CylinderGeometry(4.5, 4.5, 1, 64, 1, true);
            const outerMat = new THREE.MeshStandardMaterial({ roughness: 0.6, metalness: 0.1 });
            outerMesh = new THREE.Mesh(outerGeo, outerMat);

            const innerGeo = new THREE.CylinderGeometry(4.48, 4.48, 1, 64, 1, true);
            const innerMat = new THREE.MeshStandardMaterial({ roughness: 0.8, side: THREE.BackSide });
            innerMesh = new THREE.Mesh(innerGeo, innerMat);

            braceletGroup.add(outerMesh);
            braceletGroup.add(innerMesh);
            scene.add(braceletGroup);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = false;
            controls.autoRotate = true;

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function update3DTexture() {
            const val = document.getElementById('input-text').value.toUpperCase().trim();
            const bg = document.getElementById('color-bg').value;
            const tx = document.getElementById('color-text').value;

            innerMesh.material.color.set(bg);

            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = tx;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            
            let fontSize = 80;
            ctx.font = `bold ${fontSize}px Arial Black, sans-serif`;
            
            let textWidth = ctx.measureText(val).width;
            if (textWidth > 900) {
                fontSize = Math.floor(fontSize * (900 / textWidth));
                ctx.font = `bold ${fontSize}px Arial Black, sans-serif`;
            }

            ctx.fillText(val, canvas.width * 0.25, canvas.height / 2);
            ctx.fillText(val, canvas.width * 0.75, canvas.height / 2);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; 
            outerMesh.material.map = tex;
            outerMesh.material.needsUpdate = true;
        }

        // --- FONCTIONS FIREBASE ---

        async function saveBracelet() {
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';

            const item = {
                text: document.getElementById('input-text').value,
                bg: document.getElementById('color-bg').value,
                tx: document.getElementById('color-text').value,
                note: document.getElementById('input-event').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("bracelets").add(item);
                alert("Bracelet sauvegardé dans Firebase !");
                document.getElementById('input-event').value = "";
            } catch (error) {
                console.error("Erreur Fire:", error);
                alert("Erreur lors de la sauvegarde.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> SAUVEGARDER DANS FIREBASE';
            }
        }

        function loadBracelets() {
            const grid = document.getElementById('explorer-grid');
            grid.innerHTML = "Chargement du cloud...";

            db.collection("bracelets").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                grid.innerHTML = "";
                snapshot.forEach((doc) => {
                    const i = doc.data();
                    const id = doc.id;
                    const card = `
                        <div class="bracelet-item">
                            <i class="fas fa-trash btn-delete" onclick="deleteBracelet('${id}')"></i>
                            <div class="mini-bandeau" style="background:${i.bg}; color:${i.tx}">${i.text}</div>
                            <div style="font-size:0.8rem; color:#64748b">
                                <strong>${i.text}</strong><br>
                                ${i.note || 'Sans note'}
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            });
        }

        async function deleteBracelet(id) {
            if(confirm("Supprimer ce bracelet du cloud ?")) {
                await db.collection("bracelets").doc(id).delete();
            }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'explorer') loadBracelets();
        }

        window.onload = () => { init3D(); update3DTexture(); };
    </script>
</body>
</html>
