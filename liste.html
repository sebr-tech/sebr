<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail - SEBR</title>

    <!-- DOMPurify : protection XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"
            integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        :root { --bg-dark: #050a0f; --poly-cyan: #009EE3; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark); color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-nav {
            width: 100%; padding: 20px; box-sizing: border-box;
            background: #161f2b; border-bottom: 2px solid #333;
        }
        .btn-back {
            color: #ccc; background: rgba(255,255,255,0.05); 
            border: 1px solid #444; cursor: pointer;
            font-size: 0.9em; font-weight: bold; padding: 8px 15px; border-radius: 5px;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-back:hover { 
            color: white; background: rgba(255,255,255,0.1);
            border-color: var(--theme-color, #009EE3);
        }
        
        .main-content {
            width: 100%; max-width: 800px; padding: 30px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 25px;
        }
        
        .hero-section {
            background: #0b1118; border-radius: 15px; padding: 25px;
            display: flex; align-items: center; justify-content: space-between; gap: 20px; 
            border-top: 5px solid var(--theme-color, #009EE3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .hero-logo, .hero-prez { 
            width: 110px; height: 110px; border-radius: 50%; 
            object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            background: #111; border: 2px solid #222;
            flex-shrink: 0;
        }
        
        .hero-info { flex: 1; text-align: left; }
        .hero-info h1 { margin: 0; font-size: 1.8em; text-transform: uppercase; color: var(--theme-color, white); }
        .hero-info h2 { margin: 5px 0 10px 0; font-size: 1.1em; color: #aaa; font-weight: normal; }
        
        .rank-badge {
            display: inline-block; background: #ffd700; color: #000; font-weight: bold;
            padding: 4px 12px; border-radius: 20px; text-transform: uppercase; font-size: 0.75em;
        }

        .photo-collective-container {
            width: 100%; border-radius: 15px; overflow: hidden;
            background: #161f2b; border: 1px solid #333;
        }
        .photo-collective { 
            width: 100%; 
            height: auto;
            display: block;
        }
        .no-photo { padding: 40px; text-align: center; color: #666; font-style: italic; }

        .linked-events-section { width: 100%; margin-top: 10px; }
        .linked-events-section h3 { 
            font-size: 0.9em; letter-spacing: 2px; color: var(--theme-color); 
            text-transform: uppercase; margin-bottom: 15px; border-left: 3px solid var(--theme-color); padding-left: 10px;
        }
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .event-mini-card {
            background: #0b1118; padding: 15px; border-radius: 10px; border: 1px solid #222;
        }
        .event-mini-card.rezo-type { border: 1px solid var(--theme-color); background: rgba(0, 158, 227, 0.05); }
        .event-mini-date { font-size: 0.75em; font-weight: bold; color: var(--theme-color); margin-bottom: 5px; text-transform: uppercase; }
        .event-mini-nom { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
        .event-mini-desc { font-size: 0.85em; color: #888; line-height: 1.4; }

        .insta-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none;
            font-weight: bold; font-size: 1em; transition: transform 0.2s; align-self: center;
        }
        .insta-btn:hover { transform: scale(1.05); }

        #loader { text-align: center; padding: 50px; color: #aaa; font-style: italic; }

        /* ===== SECTION BRACELETS ===== */
        .bracelets-section {
            width: 100%;
            margin-top: 10px;
        }

        .bracelets-section h3 {
            font-size: 0.9em;
            letter-spacing: 2px;
            color: var(--theme-color, #009EE3);
            text-transform: uppercase;
            margin-bottom: 15px;
            border-left: 3px solid var(--theme-color, #009EE3);
            padding-left: 10px;
        }

        .bracelets-grid-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .bracelet-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bracelet-item:hover { transform: translateY(-3px); }

        .bracelet-shape {
            width: 130px;
            height: 50px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 3px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.35), 0 6px 18px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Effet silicone légèrement brillant sur le dessus */
        .bracelet-shape::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 15%;
            right: 15%;
            height: 6px;
            background: rgba(255,255,255,0.12);
            border-radius: 10px;
        }

        .bracelet-label {
            font-size: 0.72em;
            color: #667;
            text-align: center;
            max-width: 130px;
        }

        .btn-voir-bracelet {
            font-size: 0.7em;
            color: var(--theme-color, #009EE3);
            background: transparent;
            border: 1px solid rgba(0,158,227,0.3);
            padding: 3px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-voir-bracelet:hover {
            background: rgba(0,158,227,0.1);
        }

        @media (max-width: 600px) {
            .hero-section { flex-direction: column; text-align: center; }
            .hero-info { text-align: center; }
            .hero-logo, .hero-prez { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <button class="btn-back" onclick="history.back();">← RETOUR</button>
    </div>

    <div id="loader">Chargement...</div>
    <div id="main-content" class="main-content" style="display: none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1_SgV4E80Qxs2vQ-_jIGexv6YYqaiARs",
            authDomain: "sebr-dea8d.firebaseapp.com",
            projectId: "sebr-dea8d",
            storageBucket: "sebr-dea8d.firebasestorage.app",
            messagingSenderId: "948314281215",
            appId: "1:948314281215:web:1fddf38350d9a3663e68ca"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Helpers sécurisés ---
        function t(str) { return str ? String(str) : ''; }

        function safeImgSrc(src) {
            if (!src) return '';
            const s = String(src).trim();
            if (/^(https?:\/\/|\/|[a-zA-Z0-9_\-]+\.(png|jpg|jpeg|gif|webp))/.test(s)) return s;
            return '';
        }

        function safeInstaLink(instaString) {
            if (!instaString) return null;
            let link = String(instaString).trim();
            if (link.startsWith('@')) link = 'https://www.instagram.com/' + link.substring(1);
            else if (!link.startsWith('http')) link = 'https://www.instagram.com/' + link;
            try {
                const url = new URL(link);
                if (url.hostname === 'www.instagram.com' || url.hostname === 'instagram.com') return url.href;
            } catch (_) {}
            return null;
        }

        function safeColor(color) {
            if (!color) return '#009EE3';
            return /^#[0-9A-Fa-f]{3,8}$/.test(String(color).trim()) ? color : '#009EE3';
        }

        function safeParam(val) {
            if (!val) return null;
            return /^[a-zA-Z0-9_\-]+$/.test(val) ? val : null;
        }

        function safeAnnee(val) {
            if (!val) return null;
            return /^\d{4}-\d{4}$/.test(val) ? val : null;
        }

        const params = new URLSearchParams(window.location.search);
        const ecoleId = safeParam(params.get('ecole'));
        const annee   = safeAnnee(params.get('annee'));
        const typeKey = safeParam(params.get('type'));
        const itemId  = params.get('id') ? decodeURIComponent(params.get('id')) : null;

        const loader  = document.getElementById('loader');

        async function loadData() {
            if (!ecoleId || !annee || !typeKey || !itemId) {
                loader.textContent = "Paramètres manquants.";
                return;
            }

            try {
                const archiveSnap = await getDoc(doc(db, "ecoles", ecoleId, "archives", annee));
                if (!archiveSnap.exists()) {
                    loader.textContent = "Données introuvables.";
                    return;
                }
                const archiveData = archiveSnap.data();

                let item = null;
                const section = archiveData[typeKey];

                if (Array.isArray(section)) {
                    item = section.find(i => (i.nom || i.prez) === itemId);
                } else if (section && typeof section === 'object') {
                    item = section;
                }

                if (!item) {
                    loader.textContent = "Élément introuvable.";
                    return;
                }

                const eventSnap = await getDoc(doc(db, "ecoles", ecoleId, "events", annee));
                const eventsData = eventSnap.exists() ? eventSnap.data() : { locaux: [] };

                // Charger les bracelets liés
                const bracelets = await loadLinkedBracelets(ecoleId, annee, item.nom, typeKey);

                renderPage(item, eventsData, typeKey, bracelets);

            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('loader').textContent = "Erreur lors du chargement.";
            }
        }

        // Charger les bracelets depuis la collection "bracelets" liés à cette liste/ville/année
        async function loadLinkedBracelets(ecoleId, annee, nomListe, typeKey) {
            try {
                let bracelets = [];

                // Chercher par listeLiee (nom exact de la liste)
                if (nomListe) {
                    const q1 = query(
                        collection(db, "bracelets"),
                        where("listeLiee", "==", nomListe)
                    );
                    const snap1 = await getDocs(q1);
                    snap1.forEach(d => bracelets.push({ id: d.id, ...d.data() }));
                }

                // Chercher aussi les bracelets liés uniquement à la ville+année (sans liste spécifique)
                // si on est sur la page BDE/BDP (pas une liste spécifique)
                if (typeKey === 'bde_actuel' || typeKey === 'bdp_actuel') {
                    const q2 = query(
                        collection(db, "bracelets"),
                        where("ville", "==", ecoleId),
                        where("annee", "==", annee),
                        where("listeLiee", "==", null)
                    );
                    try {
                        const snap2 = await getDocs(q2);
                        snap2.forEach(d => {
                            if (!bracelets.find(b => b.id === d.id)) {
                                bracelets.push({ id: d.id, ...d.data() });
                            }
                        });
                    } catch(e) { /* index peut ne pas exister encore */ }
                }

                return bracelets;
            } catch (e) {
                console.error("Erreur chargement bracelets:", e);
                return [];
            }
        }

        function createElement(tag, attrs = {}, textContent = null) {
            const el = document.createElement(tag);
            for (const [k, v] of Object.entries(attrs)) {
                if (k === 'style') el.setAttribute('style', v);
                else el.setAttribute(k, v);
            }
            if (textContent !== null) el.textContent = textContent;
            return el;
        }

        function renderPage(item, eventsData, typeKey, bracelets) {
            document.getElementById('loader').style.display = 'none';
            const content = document.getElementById('main-content');
            content.style.display = 'flex';
            content.innerHTML = '';

            const themeColor = safeColor(item.couleur);
            document.documentElement.style.setProperty('--theme-color', themeColor);

            // --- HERO ---
            const heroSection = createElement('div', { class: 'hero-section' });

            const logoSrc = safeImgSrc(
                (typeKey === 'bde_actuel' || typeKey === 'bdp_actuel')
                    ? `${ecoleId}.png`
                    : (item.logo || `${ecoleId}.png`)
            );
            const logoImg = createElement('img', { class: 'hero-logo', src: logoSrc || '' });
            logoImg.addEventListener('error', () => { logoImg.src = 'default.png'; });
            heroSection.appendChild(logoImg);

            const heroInfo = createElement('div', { class: 'hero-info' });
            const h1 = createElement('h1', {}, t(item.nom || (typeKey === 'bde_actuel' ? 'BDE' : 'BDP')));
            heroInfo.appendChild(h1);
            const h2 = createElement('h2', {}, `Prez : ${t(item.prez || 'Inconnu')}`);
            heroInfo.appendChild(h2);

            if (item.vp && item.vp.trim() !== "") {
                const h2Vp = createElement('h2', { style: 'margin-bottom: 5px; color: #ccc; font-size: 1em;' }, `VP : ${t(item.vp)}`);
                heroInfo.appendChild(h2Vp);
            }
            if (item.rr && item.rr.trim() !== "") {
                const h2Rr = createElement('h2', { style: 'margin-bottom: 5px; color: #ccc; font-size: 1em;' }, `RR : ${t(item.rr)}`);
                heroInfo.appendChild(h2Rr);
            }

            if (item.classement) {
                const badge = createElement('div', { class: 'rank-badge' }, t(item.classement));
                heroInfo.appendChild(badge);
            }

            heroSection.appendChild(heroInfo);

            const prezPhotoSrc = safeImgSrc(item.photo);
            if (prezPhotoSrc && prezPhotoSrc !== logoSrc) {
                const prezImg = createElement('img', { class: 'hero-prez', src: prezPhotoSrc, alt: 'Prez' });
                prezImg.addEventListener('error', () => { prezImg.style.display = 'none'; });
                heroSection.appendChild(prezImg);
            }

            content.appendChild(heroSection);

            // --- PHOTO COLLECTIVE ---
            const photoCollContainer = createElement('div', { class: 'photo-collective-container' });
            const photoCollSrc = safeImgSrc(item.photo_coll);
            if (photoCollSrc) {
                const img = createElement('img', { class: 'photo-collective', src: photoCollSrc, alt: 'Photo collective' });
                img.addEventListener('error', () => {
                    img.replaceWith(createElement('div', { class: 'no-photo' }, 'Photo non disponible.'));
                });
                photoCollContainer.appendChild(img);
            } else {
                photoCollContainer.appendChild(createElement('div', { class: 'no-photo' }, 'Pas de photo collective disponible.'));
            }
            content.appendChild(photoCollContainer);

            // --- INSTAGRAM ---
            const instaLink = safeInstaLink(item.insta);
            if (instaLink) {
                const a = createElement('a', {
                    href: instaLink,
                    target: '_blank',
                    rel: 'noopener noreferrer',
                    class: 'insta-btn'
                }, '📸 INSTAGRAM');
                content.appendChild(a);
            }

            // --- ÉVÉNEMENTS ---
            let linkedEvents = [];
            const locaux = Array.isArray(eventsData.locaux) ? eventsData.locaux : [];

            if (typeKey === 'bde_actuel') {
                linkedEvents = locaux.filter(ev => ev.orga === 'BDE');
            } else if (typeKey === 'bdp_actuel') {
                linkedEvents = locaux.filter(ev => ev.orga === 'BDP');
            } else {
                linkedEvents = locaux.filter(ev => ev.listeLiee === item.nom);
            }

            if (typeKey === 'bde_actuel' && eventsData.soiree && eventsData.soiree.nom && eventsData.soiree.nom.trim() !== "") {
                linkedEvents.unshift({
                    nom: `SOIRÉE REZO : ${eventsData.soiree.nom}`,
                    date: eventsData.soiree.date,
                    desc: "L'événement majeur du réseau !",
                    isRezo: true
                });
            }

            if (linkedEvents.length > 0) {
                linkedEvents.sort((a, b) => (a.date?.seconds || 0) - (b.date?.seconds || 0));

                const section = createElement('div', { class: 'linked-events-section' });
                const h3 = createElement('h3', {}, 'Événements');
                section.appendChild(h3);

                const grid = createElement('div', { class: 'events-grid' });

                linkedEvents.forEach(ev => {
                    const d = ev.date?.toDate ? ev.date.toDate() : (ev.date ? new Date(ev.date) : null);
                    const dateStr = d ? d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' }) : 'À venir';

                    const card = createElement('div', { class: `event-mini-card${ev.isRezo ? ' rezo-type' : ''}` });
                    card.appendChild(createElement('div', { class: 'event-mini-date' }, dateStr));
                    card.appendChild(createElement('div', { class: 'event-mini-nom' }, t(ev.nom).toUpperCase()));
                    card.appendChild(createElement('div', { class: 'event-mini-desc' }, t(ev.desc)));
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                content.appendChild(section);
            }

            // --- BRACELETS LIÉS ---
            if (bracelets.length > 0) {
                const braceletsSection = createElement('div', { class: 'bracelets-section' });
                const bh3 = createElement('h3', {}, '🪬 Bracelets');
                braceletsSection.appendChild(bh3);

                const bGrid = createElement('div', { class: 'bracelets-grid-detail' });

                bracelets.forEach(b => {
                    const bItem = createElement('div', { class: 'bracelet-item' });

                    const bShape = createElement('div', { 
                        class: 'bracelet-shape',
                        style: `background: ${b.couleurFond || '#003057'}; color: ${b.couleurTexte || '#ffffff'};`
                    });
                    bShape.textContent = (b.texte || 'BRACELET').slice(0, 14);
                    bItem.appendChild(bShape);

                    const bLabel = createElement('div', { class: 'bracelet-label' });
                    bLabel.textContent = `${b.ville || ''} · ${b.annee || ''}`;
                    bItem.appendChild(bLabel);

                    const bBtn = createElement('button', { class: 'btn-voir-bracelet' }, '👁 Voir');
                    bBtn.addEventListener('click', () => {
                        // Redirection vers bracelets.html avec l'ID du bracelet en paramètre
                        window.open(`bracelets.html?bracelet=${encodeURIComponent(b.id)}`, '_blank');
                    });
                    bItem.appendChild(bBtn);

                    bGrid.appendChild(bItem);
                });

                braceletsSection.appendChild(bGrid);
                content.appendChild(braceletsSection);
            }
        }

        loadData();
    </script>
</body>
</html>
