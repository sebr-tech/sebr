<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEBR.tech — Admin</title>

  <script src="https://www.google.com/recaptcha/api.js?render=6LeAoJosAAAAADtz2OXhUt4t8Un4pdDjvXI98_rH"></script>

  <style>
    :root {
      --poly-blue: #003057;
      --poly-cyan: #009EE3;
      --bg-dark: #050a0f;
      --bg-panel: #0b1118;
      --bg-input: #161f2b;
      --line: #222;
      --line-2: #333;
      --text: #ffffff;
      --muted: #aaa;
      --muted-2: #777;
      --success: #44ff44;
      --error: #ff4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 0 25px;
      background: var(--poly-blue);
      height: 65px;
      border-bottom: 3px solid var(--poly-cyan);
    }

    header a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }

    .logo-title {
      font-weight: 800;
      color: var(--poly-cyan);
      letter-spacing: 2px;
      text-align: center;
      flex: 1;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-top: 3px solid var(--poly-cyan);
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--line-2);
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      color: var(--muted-2);
      transition: 0.3s;
      user-select: none;
      font-size: 0.9em;
    }

    .tab.active {
      color: var(--poly-cyan);
      border-bottom: 2px solid var(--poly-cyan);
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 16px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.85em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 15px;
      background: var(--bg-input);
      border: 1px solid var(--line-2);
      border-radius: 5px;
      color: white;
      font-size: 1em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group select option { background: #1a2535; }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--poly-cyan);
      box-shadow: 0 0 0 3px rgba(0, 158, 227, 0.16);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .forgot-link {
      display: block;
      margin-top: 8px;
      text-align: right;
      font-size: 0.8em;
      color: var(--poly-cyan);
      cursor: pointer;
    }

    .btn-action {
      width: 100%;
      padding: 14px;
      background: var(--poly-cyan);
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn-action:hover { filter: brightness(1.06); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    #msg-feedback {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9em;
      min-height: 20px;
      line-height: 1.4;
    }

    .error { color: var(--error); }
    .success {
      color: var(--success);
      border: 1px solid var(--success);
      padding: 10px;
      border-radius: 5px;
      background: rgba(68, 255, 68, 0.1);
    }

    /* Bandeau info rôle */
    .role-notice {
      background: rgba(0, 158, 227, 0.08);
      border: 1px solid rgba(0, 158, 227, 0.25);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.8em;
      color: #aaa;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .role-notice strong { color: var(--poly-cyan); }

    .recaptcha-notice {
      color: #555;
      font-size: 0.75em;
      text-align: center;
      margin-top: 15px;
    }

    @media (max-width: 480px) {
      header { padding: 0 14px; height: 60px; }
      .login-box { padding: 24px 18px; }
      .logo-title { letter-spacing: 1px; font-size: 0.95rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <div class="logo-title">SEBR.tech — Connexion</div>
    <div style="width:60px"></div>
  </header>

  <main>
    <div class="login-box">
      <div class="tabs">
        <div class="tab active" id="tab-login">Connexion</div>
        <div class="tab" id="tab-register">Créer un compte</div>
      </div>

      <h2 id="form-title" style="color: var(--poly-cyan); margin-bottom: 20px; text-align: center;">🔒 Accès</h2>

      <!-- EMAIL (commun) -->
      <div class="form-group">
        <label for="input-email">Adresse email</label>
        <input type="email" id="input-email" placeholder="nom@exemple.fr" autocomplete="email">
      </div>

      <!-- Champs inscription UTILISATEUR uniquement -->
      <div id="register-user-fields" style="display:none;">
        <div class="role-notice">
          Vous créez un compte <strong>Utilisateur</strong>. Vous pourrez proposer des modifications
          qui seront validées par un éditeur ou admin avant publication.
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-prenom">Prénom</label>
            <input type="text" id="input-prenom" placeholder="Ex: Jean">
          </div>
          <div class="form-group">
            <label for="input-ecole">Ton école</label>
            <select id="input-ecole">
              <option value="lille">Lille</option>
              <option value="sorbonne">Sorbonne</option>
              <option value="saclay">Saclay</option>
              <option value="nancy">Nancy</option>
              <option value="nantes">Nantes</option>
              <option value="angers">Angers</option>
              <option value="orleans">Orléans</option>
              <option value="tours">Tours</option>
              <option value="clermont">Clermont</option>
              <option value="lyon">Lyon</option>
              <option value="dijon">Dijon</option>
              <option value="annecy">Annecy</option>
              <option value="grenoble">Grenoble</option>
              <option value="montpellier">Montpellier</option>
              <option value="marseille">Marseille</option>
              <option value="nice">Nice</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="input-password-register">Mot de passe</label>
          <input type="password" id="input-password-register" placeholder="8 caractères minimum" autocomplete="new-password">
        </div>
      </div>

      <!-- Champs connexion / inscription éditeur -->
      <div id="pass-container" class="form-group">
        <label for="input-password">Mot de passe</label>
        <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
        <span class="forgot-link" id="btn-forgot">Mot de passe oublié ?</span>
      </div>

      <button class="btn-action" id="btn-submit">Se connecter</button>

      <div id="msg-feedback" aria-live="polite"></div>
      <p class="recaptcha-notice">Protégé par reCAPTCHA v3</p>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
      setPersistence,
      browserSessionPersistence,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1_SgV4E80Qxs2vQ-_jIGexv6YYqaiARs",
      authDomain: "sebr-dea8d.firebaseapp.com",
      projectId: "sebr-dea8d",
      storageBucket: "sebr-dea8d.firebasestorage.app",
      messagingSenderId: "948314281215",
      appId: "1:948314281215:web:1fddf38350d9a3663e68ca"
    };

    const app = initializeApp(firebaseConfig);

    initializeAppCheck(app, {
      provider: new ReCaptchaV3Provider("6LeAoJosAAAAADtz2OXhUt4t8Un4pdDjvXI98_rH"),
      isTokenAutoRefreshEnabled: true
    });

    const auth = getAuth(app);
    const db = getFirestore(app);

    // MODE : 'login' | 'register-user' | 'register-editor'
    let mode = 'login';
    let blockRedirect = false;

    const tabLogin    = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const passContainer       = document.getElementById('pass-container');
    const registerUserFields  = document.getElementById('register-user-fields');
    const btnSubmit   = document.getElementById('btn-submit');
    const formTitle   = document.getElementById('form-title');
    const feedback    = document.getElementById('msg-feedback');
    const btnForgot   = document.getElementById('btn-forgot');
    const emailInput  = document.getElementById('input-email');
    const passwordInput       = document.getElementById('input-password');
    const passwordRegInput    = document.getElementById('input-password-register');

    function setFeedback(type, message) {
      feedback.className = type;
      feedback.textContent = message;
    }

    /* ── Bascule des onglets ── */
    function setMode(newMode) {
      mode = newMode;
      feedback.textContent = '';
      feedback.className = '';

      if (newMode === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        passContainer.style.display = 'block';
        registerUserFields.style.display = 'none';
        btnSubmit.textContent = 'Se connecter';
        formTitle.textContent = '🔒 Accès';
        passwordInput.value = '';
      } else {
        // register — on détecte plus tard si pré-approuvé ou non
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        passContainer.style.display = 'none';
        registerUserFields.style.display = 'block';
        btnSubmit.textContent = "Créer mon compte";
        formTitle.textContent = '📝 Inscription';
        passwordInput.value = '';
      }
    }

    tabLogin.addEventListener('click', () => setMode('login'));
    tabRegister.addEventListener('click', () => setMode('register'));

    /* ── Redirection si déjà connecté ── */
    onAuthStateChanged(auth, async (user) => {
      if (user && !blockRedirect) {
        // Vérifie le rôle pour rediriger vers admin ou index
        try {
          const snap = await getDoc(doc(db, "users", user.email));
          if (snap.exists()) {
            const role = snap.data().role;
            if (role === 'admin' || role === 'editor') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'index.html';
            }
          } else {
            window.location.href = 'index.html';
          }
        } catch {
          window.location.href = 'index.html';
        }
      }
    });

    /* ── Mot de passe oublié ── */
    btnForgot.addEventListener('click', async () => {
      const email = emailInput.value.trim().toLowerCase();
      if (!email) { setFeedback('error', "Saisissez votre e-mail d'abord."); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        setFeedback('success', "Lien de réinitialisation envoyé !");
      } catch (e) {
        setFeedback('error', "Erreur : " + (e?.message || "action impossible"));
      }
    });

    /* ── Soumission principale ── */
    btnSubmit.addEventListener('click', async () => {
      const email    = emailInput.value.trim().toLowerCase();
      const password = mode === 'login' ? passwordInput.value : passwordRegInput.value;

      if (!email) { setFeedback('error', "Veuillez saisir votre email."); return; }

      btnSubmit.disabled = true;
      setFeedback('', "Traitement...");

      try {
        /* ════ CONNEXION ════ */
        if (mode === 'login') {
          if (!password) throw new Error("Veuillez saisir votre mot de passe.");
          blockRedirect = false;
          await setPersistence(auth, browserSessionPersistence);
          await signInWithEmailAndPassword(auth, email, password);
          // La redirection est gérée par onAuthStateChanged

        /* ════ INSCRIPTION ════ */
        } else {
          if (password.length < 8) throw new Error("Le mot de passe doit contenir au moins 8 caractères.");

          const prenom  = document.getElementById('input-prenom').value.trim();
          const ecole   = document.getElementById('input-ecole').value;

          // Vérifie si l'email est pré-approuvé (editor / admin)
          const userRef  = doc(db, "users", email);
          const userSnap = await getDoc(userRef);

          if (userSnap.exists() && (userSnap.data().role === 'editor' || userSnap.data().role === 'admin')) {
            /* ── Inscription éditeur pré-approuvé : mot de passe défini directement ── */
            blockRedirect = true;
            await createUserWithEmailAndPassword(auth, email, password);
            // Mise à jour du doc existant avec le prénom si fourni
            await setDoc(userRef, {
              prenom: prenom || userSnap.data().prenom || "",
              createdAt: serverTimestamp()
            }, { merge: true });
            await signOut(auth);
            setFeedback('success', "✅ Compte éditeur créé ! Vous pouvez maintenant vous connecter.");
            setTimeout(() => setMode('login'), 3000);

          } else {
            /* ── Inscription utilisateur standard ── */
            if (!prenom) throw new Error("Veuillez saisir votre prénom.");
            if (!ecole)  throw new Error("Veuillez sélectionner votre école.");

            blockRedirect = true;
            const credential = await createUserWithEmailAndPassword(auth, email, password);

            // Crée le document utilisateur
            await setDoc(userRef, {
              role: 'user',
              ecole: ecole,
              prenom: prenom,
              proposalsCount: 0,
              createdAt: serverTimestamp()
            });

            // Connecte directement et redirige vers l'accueil
            blockRedirect = false;
            window.location.href = 'index.html';
          }
        }

      } catch (e) {
        blockRedirect = false;
        let errMsg = e?.message || "Une erreur est survenue.";
        if (e?.code === 'auth/email-already-in-use') errMsg = "Ce compte existe déjà. Connectez-vous.";
        if (e?.code === 'auth/weak-password')        errMsg = "Mot de passe trop faible (8 caractères min).";
        if (e?.code === 'auth/invalid-email')        errMsg = "Adresse email invalide.";
        if (e?.code === 'auth/user-not-found' || e?.code === 'auth/wrong-password' || e?.code === 'auth/invalid-credential')
          errMsg = "Email ou mot de passe incorrect.";
        setFeedback('error', errMsg);
      } finally {
        btnSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>
