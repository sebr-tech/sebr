<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEBR.tech — Admin</title>

  <script src="https://www.google.com/recaptcha/api.js?render=6LeAoJosAAAAADtz2OXhUt4t8Un4pdDjvXI98_rH"></script>

  <style>
    :root {
      --poly-blue: #003057;
      --poly-cyan: #009EE3;
      --bg-dark: #050a0f;
      --bg-panel: #0b1118;
      --bg-input: #161f2b;
      --line: #222;
      --line-2: #333;
      --text: #ffffff;
      --muted: #aaa;
      --muted-2: #777;
      --success: #44ff44;
      --error: #ff4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 0 25px;
      background: var(--poly-blue);
      height: 65px;
      border-bottom: 3px solid var(--poly-cyan);
    }

    header a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }

    .logo-title {
      font-weight: 800;
      color: var(--poly-cyan);
      letter-spacing: 2px;
      text-align: center;
      flex: 1;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-top: 3px solid var(--poly-cyan);
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--line-2);
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      color: var(--muted-2);
      transition: 0.3s;
      user-select: none;
      font-size: 0.9em;
    }

    .tab.active {
      color: var(--poly-cyan);
      border-bottom: 2px solid var(--poly-cyan);
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 16px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.85em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 15px;
      background: var(--bg-input);
      border: 1px solid var(--line-2);
      border-radius: 5px;
      color: white;
      font-size: 1em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group select option { background: #1a2535; }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--poly-cyan);
      box-shadow: 0 0 0 3px rgba(0, 158, 227, 0.16);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .forgot-link {
      display: block;
      margin-top: 8px;
      text-align: right;
      font-size: 0.8em;
      color: var(--poly-cyan);
      cursor: pointer;
    }

    .btn-action {
      width: 100%;
      padding: 14px;
      background: var(--poly-cyan);
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn-action:hover { filter: brightness(1.06); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    #msg-feedback {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9em;
      min-height: 20px;
      line-height: 1.4;
    }

    .error { color: var(--error); }
    .success {
      color: var(--success);
      border: 1px solid var(--success);
      padding: 10px;
      border-radius: 5px;
      background: rgba(68, 255, 68, 0.1);
    }

    .role-notice {
      background: rgba(0, 158, 227, 0.08);
      border: 1px solid rgba(0, 158, 227, 0.25);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.8em;
      color: #aaa;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .role-notice strong { color: var(--poly-cyan); }

    .recaptcha-notice {
      color: #555;
      font-size: 0.75em;
      text-align: center;
      margin-top: 15px;
    }

    @media (max-width: 480px) {
      header { padding: 0 14px; height: 60px; }
      .login-box { padding: 24px 18px; }
      .logo-title { letter-spacing: 1px; font-size: 0.95rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <div class="logo-title">SEBR.tech — Connexion</div>
    <div style="width:60px"></div>
  </header>

  <main>
    <div class="login-box">
      <div class="tabs">
        <div class="tab active" id="tab-login">Connexion</div>
        <div class="tab" id="tab-register">Créer un compte</div>
      </div>

      <h2 id="form-title" style="color: var(--poly-cyan); margin-bottom: 20px; text-align: center;">🔒 Accès</h2>

      <div class="form-group">
        <label for="input-email">Adresse email</label>
        <input type="email" id="input-email" placeholder="nom@exemple.fr" autocomplete="email">
      </div>

      <div id="register-user-fields" style="display:none;">
        <div class="role-notice">
          Vous créez un compte <strong>Utilisateur</strong>. Vous pourrez proposer des modifications
          qui seront validées par un éditeur ou admin avant publication.
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-prenom">Prénom</label>
            <input type="text" id="input-prenom" placeholder="Ex: Jean">
          </div>
          <div class="form-group">
            <label for="input-ecole">Ton école</label>
            <select id="input-ecole">
              <option value="lille">Lille</option>
              <option value="sorbonne">Sorbonne</option>
              <option value="saclay">Saclay</option>
              <option value="nancy">Nancy</option>
              <option value="nantes">Nantes</option>
              <option value="angers">Angers</option>
              <option value="orleans">Orléans</option>
              <option value="tours">Tours</option>
              <option value="clermont">Clermont</option>
              <option value="lyon">Lyon</option>
              <option value="dijon">Dijon</option>
              <option value="annecy">Annecy</option>
              <option value="grenoble">Grenoble</option>
              <option value="montpellier">Montpellier</option>
              <option value="marseille">Marseille</option>
              <option value="nice">Nice</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="input-password-register">Mot de passe</label>
          <input type="password" id="input-password-register" placeholder="8 caractères minimum" autocomplete="new-password">
        </div>
      </div>

      <div id="pass-container" class="form-group">
        <label for="input-password">Mot de passe</label>
        <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
        <span class="forgot-link" id="btn-forgot">Mot de passe oublié ?</span>
      </div>

      <button class="btn-action" id="btn-submit">Se connecter</button>

      <div id="msg-feedback" aria-live="polite"></div>
      <p class="recaptcha-notice">Protégé par reCAPTCHA v3</p>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      sendPasswordResetEmail,
      sendEmailVerification,
      onAuthStateChanged,
      setPersistence,
      browserSessionPersistence,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1_SgV4E80Qxs2vQ-_jIGexv6YYqaiARs",
      authDomain: "sebr-dea8d.firebaseapp.com",
      projectId: "sebr-dea8d",
      storageBucket: "sebr-dea8d.firebasestorage.app",
      messagingSenderId: "948314281215",
      appId: "1:948314281215:web:1fddf38350d9a3663e68ca"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let mode = 'login';
    let blockRedirect = false;

    const feedback = document.getElementById('msg-feedback');
    const btnSubmit = document.getElementById('btn-submit');
    const emailInput = document.getElementById('input-email');
    const passwordInput = document.getElementById('input-password');
    const passwordRegInput = document.getElementById('input-password-register');

    function setFeedback(type, message) {
      feedback.className = type;
      feedback.textContent = message;
    }

    // Fonction de redirection centralisée
    async function handleRedirection(user) {
      if (!user) return;
      
      // Sécurité : si l'email n'est pas vérifié, on ne redirige pas vers l'admin
      if (!user.emailVerified) {
        setFeedback('error', "Veuillez valider votre email avant de continuer.");
        await signOut(auth);
        return;
      }

      try {
        const snap = await getDoc(doc(db, "users", user.email));
        if (snap.exists()) {
          const role = snap.data().role;
          console.log("Rôle détecté :", role);
          if (role === 'admin' || role === 'editor') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          window.location.href = 'index.html';
        }
      } catch (e) {
        console.error("Erreur de redirection :", e);
        // Si erreur de permission ici, c'est que l'email n'est pas encore considéré comme vérifié par Firestore
        setFeedback('error', "Accès en cours de validation... réessayez dans quelques instants.");
      }
    }

    // Gestion automatique au chargement
    onAuthStateChanged(auth, (user) => {
      if (user && !blockRedirect) {
        handleRedirection(user);
      }
    });

    // Toggle Mode
    window.setMode = function(newMode) {
      mode = newMode;
      document.getElementById('tab-login').classList.toggle('active', mode === 'login');
      document.getElementById('tab-register').classList.toggle('active', mode !== 'login');
      document.getElementById('register-user-fields').style.display = mode === 'login' ? 'none' : 'block';
      document.getElementById('pass-container').style.display = mode === 'login' ? 'block' : 'none';
      btnSubmit.textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
    };
    document.getElementById('tab-login').onclick = () => setMode('login');
    document.getElementById('tab-register').onclick = () => setMode('register');

    // Submit
    btnSubmit.onclick = async () => {
      const email = emailInput.value.trim().toLowerCase();
      const password = mode === 'login' ? passwordInput.value : passwordRegInput.value;

      if (!email || !password) { setFeedback('error', "Champs manquants."); return; }
      
      btnSubmit.disabled = true;
      setFeedback('', "Chargement...");

      try {
        if (mode === 'login') {
          blockRedirect = false;
          await setPersistence(auth, browserSessionPersistence);
          const cred = await signInWithEmailAndPassword(auth, email, password);
          // On force la vérification immédiate
          await handleRedirection(cred.user);
        } else {
          /* INSCRIPTION */
          const prenom = document.getElementById('input-prenom').value.trim();
          const ecole = document.getElementById('input-ecole').value;
          
          blockRedirect = true;
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await sendEmailVerification(cred.user);
          
          // Création du doc
          await setDoc(doc(db, "users", email), {
            role: 'user', // Par défaut
            ecole: ecole,
            prenom: prenom,
            proposalsCount: 0,
            createdAt: serverTimestamp()
          });

          setFeedback('success', "Compte créé ! Vérifiez vos emails pour valider.");
          await signOut(auth);
          setTimeout(() => setMode('login'), 5000);
        }
      } catch (e) {
        blockRedirect = false;
        setFeedback('error', e.message);
      } finally {
        btnSubmit.disabled = false;
      }
    };
  </script>
</body>
</html>
